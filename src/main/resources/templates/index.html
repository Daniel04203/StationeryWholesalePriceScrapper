<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KS-Market Price Tracker</title>
    <meta name="description" content="Відстеження цін на канцтовари з ks-market.com.ua">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            <i class="bi bi-cart-check me-2"></i>KS-Market Price Tracker
        </a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link active" href="/">Головна</a>
            <a class="nav-link" href="/products">Управління</a>
        </div>
    </div>
</nav>

<!-- Add Product Form -->
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h5 class="card-title mb-3">
                        <i class="bi bi-plus-circle me-2 text-primary"></i>Додати товар
                    </h5>
                    <form id="addProductForm" class="d-flex gap-3">
                        <input type="url" id="productUrl" class="form-control form-control-lg"
                               placeholder="Введіть посилання на товар з ks-market.com.ua..."
                               required>
                        <button type="submit" class="btn btn-primary btn-lg px-4" id="addBtn">
                            <span class="spinner-border spinner-border-sm d-none me-1" id="addSpinner"></span>
                            Додати
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Products Grid -->
<div class="container mt-4 mb-5">
    <div class="row g-4" id="productsGrid">
        <div th:each="product : ${products}" class="col-sm-6 col-md-4 col-lg-3" th:id="'card-' + ${product.id}">
            <div class="card product-card h-100 shadow-sm border-0">
                <div class="card-img-wrapper">
                    <img th:src="${product.imageUrl}" th:alt="${product.name}"
                         class="card-img-top product-img"
                         onerror="this.src='/css/no-image.svg'">
                </div>
                <div class="card-body d-flex flex-column">
                    <h6 class="card-title product-name" th:text="${product.name}">Назва товару</h6>
                    <div class="mt-auto">
                        <div class="d-flex align-items-center mb-2">
                            <span th:if="${product.inStock}" class="badge bg-success-subtle text-success">
                                <i class="bi bi-circle-fill me-1 small"></i>В наявності
                            </span>
                            <span th:unless="${product.inStock}" class="badge bg-secondary-subtle text-secondary">
                                <i class="bi bi-circle me-1 small"></i>Немає
                            </span>
                        </div>
                        <div class="text-muted small mb-1">
                            <i class="bi bi-calendar3 me-1"></i>
                            <span th:text="${#temporals.format(product.updatedAt, 'dd.MM.yyyy HH:mm')}">15.01.2024</span>
                        </div>
                        <div class="price-block">
                            <span class="price-uah fw-bold" th:text="${#numbers.formatDecimal(product.priceUah, 1, 2)} + ' ₴'">0.00 ₴</span>
                            <span class="text-muted mx-1">/</span>
                            <span class="price-usd text-success" th:text="'$' + ${#numbers.formatDecimal(product.priceUsd, 1, 2)}">$0.00</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Empty state -->
        <div th:if="${#lists.isEmpty(products)}" class="col-12 text-center py-5" id="emptyState">
            <i class="bi bi-inbox display-1 text-muted"></i>
            <p class="text-muted mt-3 fs-5">Ще немає доданих товарів</p>
            <p class="text-muted">Вставте посилання на товар з ks-market.com.ua вище</p>
        </div>
    </div>
</div>

<!-- Toast Container -->
<div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
</body>
</html>

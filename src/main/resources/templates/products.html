<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управління товарами — KS-Market Price Tracker</title>
    <meta name="description" content="Управління відстежуваними товарами з ks-market.com.ua">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            <i class="bi bi-cart-check me-2"></i>KS-Market Price Tracker
        </a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/">Головна</a>
            <a class="nav-link active" href="/products">Управління</a>
        </div>
    </div>
</nav>

<!-- Content -->
<div class="container mt-4 mb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">
            <i class="bi bi-gear me-2 text-primary"></i>Управління товарами
        </h2>
        <div class="btn-group">
            <a th:href="@{/products(sort='asc')}"
               th:classappend="${currentSort == 'asc'} ? 'active' : ''"
               class="btn btn-outline-primary">
                <i class="bi bi-sort-up me-1"></i>За зростанням ціни
            </a>
            <a th:href="@{/products(sort='desc')}"
               th:classappend="${currentSort == 'desc'} ? 'active' : ''"
               class="btn btn-outline-primary">
                <i class="bi bi-sort-down me-1"></i>За спаданням ціни
            </a>
            <a href="/products" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-counterclockwise me-1"></i>Скинути
            </a>
        </div>
    </div>

    <!-- Products Table -->
    <div class="card shadow-sm border-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0" id="productsTable">
                <thead class="table-light">
                    <tr>
                        <th scope="col" style="width: 40%;">Назва товару</th>
                        <th scope="col">Ціна (₴)</th>
                        <th scope="col">Ціна ($)</th>
                        <th scope="col">Наявність</th>
                        <th scope="col">Посилання</th>
                        <th scope="col">Оновлено</th>
                        <th scope="col" class="text-center">Дії</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="product : ${products}" th:id="'row-' + ${product.id}">
                        <td>
                            <div class="d-flex align-items-center">
                                <img th:src="${product.imageUrl}" th:alt="${product.name}"
                                     class="me-3 rounded table-product-img"
                                     onerror="this.src='/css/no-image.svg'">
                                <span class="product-name-table" th:text="${product.name}">Назва</span>
                            </div>
                        </td>
                        <td class="fw-bold" th:text="${#numbers.formatDecimal(product.priceUah, 1, 2)} + ' ₴'">0.00 ₴</td>
                        <td class="text-success" th:text="'$' + ${#numbers.formatDecimal(product.priceUsd, 1, 2)}">$0.00</td>
                        <td>
                            <span th:if="${product.inStock}" class="badge bg-success-subtle text-success">
                                <i class="bi bi-check-circle me-1"></i>Є
                            </span>
                            <span th:unless="${product.inStock}" class="badge bg-secondary-subtle text-secondary">
                                <i class="bi bi-x-circle me-1"></i>Немає
                            </span>
                        </td>
                        <td>
                            <a th:href="${product.productUrl}" target="_blank"
                               class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-box-arrow-up-right"></i>
                            </a>
                        </td>
                        <td class="text-muted small" th:text="${#temporals.format(product.updatedAt, 'dd.MM.yyyy HH:mm')}">
                            15.01.2024
                        </td>
                        <td class="text-center">
                            <div class="btn-group btn-group-sm">
                                <button type="button" class="btn btn-outline-primary btn-refresh"
                                        th:data-id="${product.id}" title="Оновити ціну">
                                    <i class="bi bi-arrow-clockwise"></i>
                                </button>
                                <button type="button" class="btn btn-outline-danger btn-delete"
                                        th:data-id="${product.id}" title="Видалити">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Empty state -->
        <div th:if="${#lists.isEmpty(products)}" class="text-center py-5">
            <i class="bi bi-inbox display-4 text-muted"></i>
            <p class="text-muted mt-2">Немає відстежуваних товарів</p>
            <a href="/" class="btn btn-primary">
                <i class="bi bi-plus-circle me-1"></i>Додати товар
            </a>
        </div>
    </div>
</div>

<!-- Toast Container -->
<div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
